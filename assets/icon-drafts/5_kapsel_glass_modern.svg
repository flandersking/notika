<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Mesh-like background gradient (sunset-tech) -->
    <radialGradient id="bg5a" cx="20%" cy="20%" r="70%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </radialGradient>
    <radialGradient id="bg5b" cx="85%" cy="90%" r="60%">
      <stop offset="0%"   stop-color="#EC4899" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg5c" cx="90%" cy="15%" r="50%">
      <stop offset="0%"   stop-color="#06B6D4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>

    <!-- Liquid-glass capsule fill -->
    <linearGradient id="glassCap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.45"/>
      <stop offset="50%"  stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.30"/>
    </linearGradient>

    <!-- Waveform accent gradient -->
    <linearGradient id="wave5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#F0ABFC"/>
      <stop offset="50%"  stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>

    <filter id="capShadow5" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="18" in="SourceAlpha"/>
      <feOffset dx="0" dy="16"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="capBlur5" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Background: layered mesh gradient -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg5a)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#bg5b)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#bg5c)"/>

  <!-- Soft grain / noise substitute: diagonal highlight streak -->
  <path d="M 0 300 L 1024 0 L 1024 60 L 0 360 Z" fill="#FFFFFF" opacity="0.04"/>

  <!-- Liquid-Glass capsule, tilted -40°, 1000×360 -->
  <g transform="translate(512 512) rotate(-40) translate(-500 -180)" filter="url(#capShadow5)">

    <!-- Capsule body (single-piece glass) -->
    <path d="
      M 180 0
      L 820 0
      C 1000 0 1000 360 820 360
      L 180 360
      C 0 360 0 0 180 0 Z"
      fill="url(#glassCap)"
      stroke="#FFFFFF" stroke-width="2" stroke-opacity="0.55"
      filter="url(#capBlur5)"/>

    <!-- Inner edge subtle light refraction -->
    <path d="
      M 190 18
      L 810 18
      C 970 18 970 342 810 342
      L 190 342
      C 30 342 30 18 190 18 Z"
      fill="none" stroke="#FFFFFF" stroke-width="1.5" stroke-opacity="0.25"/>

    <!-- Top specular highlight -->
    <path d="
      M 220 26
      L 760 26
      C 880 26 900 70 880 90
      L 240 90
      C 215 80 170 55 220 26 Z"
      fill="#FFFFFF" opacity="0.35"/>

    <!-- Bottom light reflection -->
    <path d="
      M 260 320
      L 700 320
      C 780 320 790 340 780 344
      L 280 344
      C 270 340 245 332 260 320 Z"
      fill="#FFFFFF" opacity="0.12"/>

    <!-- Fluid waveform – thin, rounded, continuous across the glass -->
    <g fill="url(#wave5)">
      <rect x="210" y="162" width="14" height="36"  rx="7"/>
      <rect x="248" y="140" width="14" height="80"  rx="7"/>
      <rect x="286" y="108" width="14" height="144" rx="7"/>
      <rect x="324" y="72"  width="14" height="216" rx="7"/>
      <rect x="362" y="96"  width="14" height="168" rx="7"/>
      <rect x="400" y="130" width="14" height="100" rx="7"/>
      <rect x="438" y="82"  width="14" height="196" rx="7"/>
      <rect x="476" y="118" width="14" height="124" rx="7"/>
      <rect x="514" y="68"  width="14" height="224" rx="7"/>
      <rect x="552" y="100" width="14" height="160" rx="7"/>
      <rect x="590" y="140" width="14" height="80"  rx="7"/>
      <rect x="628" y="90"  width="14" height="180" rx="7"/>
      <rect x="666" y="118" width="14" height="124" rx="7"/>
      <rect x="704" y="152" width="14" height="56"  rx="7"/>
      <rect x="742" y="132" width="14" height="96"  rx="7"/>
      <rect x="780" y="162" width="14" height="36"  rx="7"/>
    </g>
  </g>

  <!-- Subtle corner vignette to push focus on capsule -->
  <rect width="1024" height="1024" rx="230" fill="none"
        stroke="#000000" stroke-opacity="0.15" stroke-width="3"/>
</svg>
