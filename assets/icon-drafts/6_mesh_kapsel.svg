<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Mesh-like background gradient (from v5) -->
    <radialGradient id="bg6a" cx="20%" cy="20%" r="70%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </radialGradient>
    <radialGradient id="bg6b" cx="85%" cy="90%" r="60%">
      <stop offset="0%"   stop-color="#EC4899" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#EC4899" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg6c" cx="90%" cy="15%" r="50%">
      <stop offset="0%"   stop-color="#06B6D4" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0"/>
    </radialGradient>

    <!-- Capsule gradients (from v4) -->
    <linearGradient id="capLeft6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="capRight6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>

    <filter id="capShadow6" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="16" in="SourceAlpha"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: layered mesh gradient (v5) -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg6a)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#bg6b)"/>
  <rect width="1024" height="1024" rx="230" fill="url(#bg6c)"/>

  <!-- Diagonal highlight streak (v5) -->
  <path d="M 0 300 L 1024 0 L 1024 60 L 0 360 Z" fill="#FFFFFF" opacity="0.04"/>

  <!-- Capsule tilted -40° — 1000×360 (v4 pill) -->
  <g transform="translate(512 512) rotate(-40) translate(-500 -180)" filter="url(#capShadow6)">
    <!-- Left half (blue) -->
    <path d="
      M 180 0
      L 500 0
      L 500 360
      L 180 360
      C 0 360 0 0 180 0 Z"
      fill="url(#capLeft6)"/>

    <!-- Right half (white) -->
    <path d="
      M 500 0
      L 820 0
      C 1000 0 1000 360 820 360
      L 500 360
      L 500 0 Z"
      fill="url(#capRight6)"/>

    <!-- Center seam -->
    <line x1="500" y1="14" x2="500" y2="346" stroke="#0F172A" stroke-width="4" opacity="0.25"/>

    <!-- Glass highlight on top -->
    <path d="
      M 180 18
      L 820 18
      C 960 18 970 90 955 112
      L 215 112
      C 195 100 130 78 180 18 Z"
      fill="#FFFFFF" opacity="0.20"/>

    <!-- Waveform on blue (left) side -->
    <g fill="#FFFFFF" opacity="0.97">
      <rect x="205" y="160" width="22" height="40"  rx="10"/>
      <rect x="245" y="130" width="22" height="100" rx="10"/>
      <rect x="285" y="95"  width="22" height="170" rx="10"/>
      <rect x="325" y="60"  width="22" height="240" rx="10"/>
      <rect x="365" y="115" width="22" height="130" rx="10"/>
      <rect x="405" y="80"  width="22" height="200" rx="10"/>
      <rect x="445" y="140" width="22" height="80"  rx="10"/>
    </g>

    <!-- Waveform on white (right) side (blue bars) -->
    <g fill="#2563EB">
      <rect x="540" y="140" width="22" height="80"  rx="10"/>
      <rect x="580" y="105" width="22" height="150" rx="10"/>
      <rect x="620" y="70"  width="22" height="220" rx="10"/>
      <rect x="660" y="115" width="22" height="130" rx="10"/>
      <rect x="700" y="90"  width="22" height="180" rx="10"/>
      <rect x="740" y="140" width="22" height="80"  rx="10"/>
      <rect x="780" y="165" width="22" height="30"  rx="10"/>
    </g>
  </g>

  <!-- Subtle corner vignette (v5) -->
  <rect width="1024" height="1024" rx="230" fill="none"
        stroke="#000000" stroke-opacity="0.15" stroke-width="3"/>
</svg>
