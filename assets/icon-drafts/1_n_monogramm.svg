<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#0B1437"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#93C5FD"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
  </defs>

  <!-- macOS rounded-square background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg1)"/>

  <!-- Left vertical of N -->
  <rect x="220" y="240" width="100" height="544" fill="#FFFFFF" rx="24"/>

  <!-- Right vertical of N -->
  <rect x="704" y="240" width="100" height="544" fill="#FFFFFF" rx="24"/>

  <!-- Diagonal of N rendered as waveform bars -->
  <g transform="translate(270 250) rotate(48.5)">
    <rect x="0"   y="-8"   width="28" height="16"  fill="url(#wave1)" rx="8"/>
    <rect x="48"  y="-22"  width="28" height="44"  fill="url(#wave1)" rx="8"/>
    <rect x="96"  y="-44"  width="28" height="88"  fill="url(#wave1)" rx="8"/>
    <rect x="144" y="-66"  width="28" height="132" fill="url(#wave1)" rx="8"/>
    <rect x="192" y="-88"  width="28" height="176" fill="url(#wave1)" rx="8"/>
    <rect x="240" y="-110" width="28" height="220" fill="url(#wave1)" rx="8"/>
    <rect x="288" y="-132" width="28" height="264" fill="url(#wave1)" rx="8"/>
    <rect x="336" y="-110" width="28" height="220" fill="url(#wave1)" rx="8"/>
    <rect x="384" y="-88"  width="28" height="176" fill="url(#wave1)" rx="8"/>
    <rect x="432" y="-66"  width="28" height="132" fill="url(#wave1)" rx="8"/>
    <rect x="480" y="-44"  width="28" height="88"  fill="url(#wave1)" rx="8"/>
    <rect x="528" y="-22"  width="28" height="44"  fill="url(#wave1)" rx="8"/>
    <rect x="576" y="-8"   width="28" height="16"  fill="url(#wave1)" rx="8"/>
  </g>

  <!-- subtle shadow under the diagonal to give depth -->
  <g opacity="0.12" transform="translate(270 258) rotate(48.5)">
    <rect x="0" y="-2" width="600" height="6" fill="#000" rx="3"/>
  </g>
</svg>
