<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="230" fill="url(#bg3)"/>

  <!-- Stethoscope ear-tubes (left + right) coming down -->
  <path d="M 300 180 Q 300 240 360 280 L 360 400"
        stroke="#FFFFFF" stroke-width="28" fill="none" stroke-linecap="round"/>
  <path d="M 724 180 Q 724 240 664 280 L 664 400"
        stroke="#FFFFFF" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- Ear-tips -->
  <circle cx="300" cy="170" r="22" fill="#FFFFFF"/>
  <circle cx="724" cy="170" r="22" fill="#FFFFFF"/>

  <!-- Stethoscope bend joining the two tubes -->
  <path d="M 360 400 Q 360 500 460 520 L 564 520 Q 664 500 664 400"
        stroke="#FFFFFF" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- Main tube going down from the junction -->
  <path d="M 512 520 L 512 640"
        stroke="#FFFFFF" stroke-width="28" fill="none" stroke-linecap="round"/>

  <!-- Chestpiece (stethoscope head) with waveform inside -->
  <circle cx="512" cy="720" r="130" fill="#FFFFFF"/>
  <circle cx="512" cy="720" r="100" fill="#1E3A8A"/>

  <!-- Waveform inside chestpiece -->
  <g stroke="#60A5FA" stroke-width="10" stroke-linecap="round" fill="none">
    <line x1="428" y1="720" x2="448" y2="720"/>
    <line x1="460" y1="690" x2="460" y2="750"/>
    <line x1="478" y1="660" x2="478" y2="780"/>
    <line x1="496" y1="680" x2="496" y2="760"/>
    <line x1="514" y1="650" x2="514" y2="790"/>
    <line x1="532" y1="680" x2="532" y2="760"/>
    <line x1="550" y1="660" x2="550" y2="780"/>
    <line x1="568" y1="690" x2="568" y2="750"/>
    <line x1="580" y1="720" x2="596" y2="720"/>
  </g>
</svg>
