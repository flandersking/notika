name: Kirjo

options:
  bundleIdPrefix: de.dymny.kirjo
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: P7QK554EET
    CODE_SIGN_IDENTITY: "Apple Development: mdymny@gmail.com (7WH375XZ89)"
    PROVISIONING_PROFILE_SPECIFIER: ""
    DEAD_CODE_STRIPPING: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  KirjoCore:
    path: Packages/KirjoCore
  KirjoTranscription:
    path: Packages/KirjoTranscription
  KirjoPostProcessing:
    path: Packages/KirjoPostProcessing
  KirjoDictionary:
    path: Packages/KirjoDictionary
  KirjoMacOS:
    path: Packages/KirjoMacOS
  KirjoWhisper:
    path: Packages/KirjoWhisper

targets:
  Kirjo:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Kirjo
        excludes:
          - "Resources/Info.plist"
          - "Resources/Kirjo.entitlements"
    info:
      path: Kirjo/Resources/Info.plist
      properties:
        LSUIElement: YES
        LSMinimumSystemVersion: "26.0"
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: de
        CFBundleIconFile: AppIcon
        NSHumanReadableCopyright: "© 2026 Michael Dymny"
        NSMicrophoneUsageDescription: "Kirjo nimmt Audio auf, um Sprache in Text umzuwandeln."
        NSSpeechRecognitionUsageDescription: "Kirjo nutzt Apple Speech für on-device Transkription."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: Kirjo/Resources/Kirjo.entitlements
      properties:
        com.apple.security.device.audio-input: YES
        com.apple.security.network.client: YES
    dependencies:
      - package: KirjoCore
        product: KirjoCore
      - package: KirjoTranscription
        product: KirjoTranscription
      - package: KirjoPostProcessing
        product: KirjoPostProcessing
      - package: KirjoDictionary
        product: KirjoDictionary
      - package: KirjoMacOS
        product: KirjoMacOS
      - package: KirjoWhisper
        product: KirjoWhisper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: de.dymny.kirjo.mac
        PRODUCT_NAME: Kirjo
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_LSUIElement: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
