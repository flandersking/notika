name: Notika

options:
  bundleIdPrefix: com.notika
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: P7QK554EET
    CODE_SIGN_IDENTITY: "Apple Development: mdymny@gmail.com (7WH375XZ89)"
    PROVISIONING_PROFILE_SPECIFIER: ""
    DEAD_CODE_STRIPPING: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  NotikaCore:
    path: Packages/NotikaCore
  NotikaTranscription:
    path: Packages/NotikaTranscription
  NotikaPostProcessing:
    path: Packages/NotikaPostProcessing
  NotikaDictionary:
    path: Packages/NotikaDictionary
  NotikaMacOS:
    path: Packages/NotikaMacOS
  NotikaWhisper:
    path: Packages/NotikaWhisper

targets:
  Notika:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Notika
        excludes:
          - "Resources/Info.plist"
          - "Resources/Notika.entitlements"
    info:
      path: Notika/Resources/Info.plist
      properties:
        LSUIElement: YES
        LSMinimumSystemVersion: "26.0"
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleDevelopmentRegion: de
        NSHumanReadableCopyright: "© 2026 Michael Dymny"
        NSMicrophoneUsageDescription: "Notika nimmt Audio auf, um Sprache in Text umzuwandeln."
        NSSpeechRecognitionUsageDescription: "Notika nutzt Apple Speech für on-device Transkription."
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    entitlements:
      path: Notika/Resources/Notika.entitlements
      properties:
        com.apple.security.device.audio-input: YES
        com.apple.security.network.client: YES
    dependencies:
      - package: NotikaCore
        product: NotikaCore
      - package: NotikaTranscription
        product: NotikaTranscription
      - package: NotikaPostProcessing
        product: NotikaPostProcessing
      - package: NotikaDictionary
        product: NotikaDictionary
      - package: NotikaMacOS
        product: NotikaMacOS
      - package: NotikaWhisper
        product: NotikaWhisper
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.notika.mac
        PRODUCT_NAME: Notika
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_KEY_LSUIElement: YES
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
